# The name shown in the Actions tab on GitHub.
name: Render penguins analysis

# When to run this workflow.
# 'push' means: every time you push commits to GitHub.
# Adjust the branch name below if yours is not 'main'.
on:
  push:
    branches: ["main"]

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repository files onto GitHub's machine.
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 2: Install R. Set the version to match your renv.lock,
      # i.e. the number from R.version.string on your machine.
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"   # set to YOUR version from R.version.string
          use-public-rspm: true

      # Step 3: Install renv and restore the exact packages from renv.lock.
      # Because this reads renv.lock, there is no package list to maintain
      # here: it is the same lockfile your hook guards in Part 1.
      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2
        env:
          RENV_CONFIG_PAK_ENABLED: "true"

      # Step 4: Install Quarto so we can render the document.
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Step 5: Render the penguins document.
      - name: Render Quarto document
        run: quarto render analysis.qmd

      # Step 6: Save the rendered output so you can download it.
      - name: Upload rendered output
        uses: actions/upload-artifact@v4
        with:
          name: rendered-analysis
          path: analysis.html
          retention-days: 7